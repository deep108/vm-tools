# Kamal deploy config for __PROJECT__
# https://kamal-deploy.org/docs/configuration/

# Service name — appears in container names, image tags, log lines.
service: __PROJECT__

# Image path under the registry. Kamal prepends `registry.server` automatically,
# so the full image becomes:
#   <registry.server>/<image>:<sha>
# For Google Artifact Registry, the convention is <project-id>/<repo>/<image>.
image: __GCP_PROJECT__/__GAR_REPO__/__PROJECT__

# Registry: Google Artifact Registry, narrowly scoped service account.
# - server: regional GAR endpoint
# - username: literal `_json_key_base64` (Docker's standard auth pattern for
#   GCP service-account JSON keys, base64-encoded for shell-safety)
# - password: secret reference; the base64-encoded service-account JSON lives
#   in .kamal/secrets (gitignored)
#
# An alternative pattern (self-hosted registry on Hetzner with TLS) is
# documented in vm-tools/docs/deploy-architecture.md. Default = GAR.
registry:
  server: __GAR_REGION__-docker.pkg.dev
  username: _json_key_base64
  password:
    - KAMAL_REGISTRY_PASSWORD

servers:
  web:
    - __HETZNER_HOST__

# SSH config — kamal-__PROJECT__ is a per-project user with docker access,
# created by bin/bootstrap-server. Uses the dev VM's default SSH identity.
ssh:
  user: kamal-__PROJECT__

# Build natively on the Hetzner box (amd64). Kamal's buildx forwards the
# registry credentials from the dev VM's docker config (set by bin/deploy's
# docker login step) to the remote buildkit container.
builder:
  remote: ssh://kamal-__PROJECT__@__HETZNER_HOST__
  arch: amd64

# Kamal's proxy handles SSL termination + per-host routing. Each project on
# this Hetzner box gets its own hostname → its own Let's Encrypt cert.
proxy:
  ssl: true
  host: __DOMAIN__
  app_port: 8000

# Runtime secrets injected into the deployed container. Add app secrets here
# (e.g., READWISE_API_TOKEN, ANTHROPIC_API_KEY) and put values in .kamal/secrets.
# env:
#   secret:
#     - READWISE_API_TOKEN
